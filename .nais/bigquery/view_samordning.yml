apiVersion: bigquery.cnrm.cloud.google.com/v1beta1
kind: BigQueryTable
metadata:
  name: view-samordning
  namespace: aap
  labels:
    team: aap
  annotations:
    cnrm.cloud.google.com/management-conflict-prevention-policy: none
    cnrm.cloud.google.com/state-into-spec: absent
    cnrm.cloud.google.com/project-id: {{project}}
spec:
  resourceID: view_samordning
  description: "View som viser samordningdata."
  datasetRef:
    external: ytelsestatistikk
  view:
    useLegacySql: false
    query: >-
      SELECT
        br.referanse AS behandlingsreferanse,
        s.saksnummer AS saksnummer,
        (
          SELECT
            array_agg(
              STRUCT(
                ssy.ytelse AS ytelse,
                ssy.fra_dato AS fra_dato,
                ssy.til_dato AS til_dato,
                ssy.prosent AS grad))
          FROM
            `datastream_hendelser.public_samordning_statlig_ytelse` ssy
          WHERE ssy.behandling_id = b.id
        ) AS samordning_statlige_ytelser,
        (
          SELECT
            array_agg(
              STRUCT(
                saay.fra_dato AS fra_dato,
                saay.til_dato AS til_dato,
                saay.ytelse AS ytelse))
          FROM
            `datastream_hendelser.public_samordning_avregning_andre_ytelser`
              saay
          WHERE saay.behandling_id = b.id
        ) AS avregning_andre_ytelser,
        (
          SELECT
            array_agg(
              STRUCT(
                su.fra_dato AS fra_dato,
                su.til_dato AS til_dato,
                su.grad AS grad))
          FROM
            `datastream_hendelser.public_samordning_ufore` su
          WHERE su.behandling_id = b.id
        ) AS ufore,
        (
          SELECT
            array_agg(
              STRUCT(
                sag.fra_dato AS fra_dato,
                sag.til_dato AS til_dato))
          FROM
            `datastream_hendelser.public_samordning_arbeidsgiver` sag
          WHERE sag.behandling_id = b.id
        ) AS arbeidsgiver,
      FROM `ytelsestatistikk.view_gyldige_behandlinger` gyldig
      JOIN `datastream_hendelser.public_behandling` b
        ON gyldig.behandling_id = b.id
      JOIN
        datastream_hendelser.public_behandling_referanse br
        ON
          b.referanse_id = br.id
      JOIN
        datastream_hendelser.public_sak s
        ON
          s.id = b.sak_id
      JOIN `datastream_hendelser.public_samordning_statlig_ytelse` ssy
        ON
          gyldig.behandling_id = ssy.behandling_id
