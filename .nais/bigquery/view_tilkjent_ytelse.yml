apiVersion: bigquery.cnrm.cloud.google.com/v1beta1
kind: BigQueryTable
metadata:
  name: view-tilkjent-ytelse
  namespace: aap
  labels:
    team: aap
  annotations:
    cnrm.cloud.google.com/management-conflict-prevention-policy: none
    cnrm.cloud.google.com/state-into-spec: absent
    cnrm.cloud.google.com/project-id: {{project}}
spec:
  resourceID: view_tilkjent_ytelse
  description: "View som viser tilkjent ytelse."
  datasetRef:
    external: ytelsestatistikk
  view:
    useLegacySql: false
    query: >-
      SELECT
        s.saksnummer,
        br.referanse AS behandlingsreferanse,
        (
          SELECT vedtak_tidspunkt
          FROM `datastream_hendelser.public_behandling_historikk`
          WHERE gjeldende = TRUE AND behandling_id = gyldig.behandling_id
        ) AS vedtak_tidspunkt,
        date(tp.fra_dato) AS fra_dato,
        date(tp.til_dato) AS til_dato,
        tp.dagsats,
        tp.gradering,
        tp.antall_barn AS antall_barn,
        tp.barnetillegg,
        tp.barnetillegg_sats AS barnetillegg_sats,
        tp.redusert_dagsats AS redusert_dagsats,
        tp.minstesats AS minstesats,
        tp.barnepensjon_dagsats AS barnepensjon_dagsats,
        tp.samordning_gradering AS samordning_gradering,
        tp.institusjon_gradering AS institusjon_gradering,
        tp.arbeid_gradering AS arbeid_gradering,
        tp.samordning_uforegradering AS samordning_uforegradering,
        tp.samordning_arbeidsgiver_gradering AS samordning_arbeidsgiver_gradering,
        tp.meldeplikt_gradering AS meldeplikt_gradering,
        tp.slettet as slettet, -- midlertidig felt, for testing
        DATETIME(ty.opprettet_tidspunkt) AS reg_dato,
        GREATEST(
          bh.oppdatert_tid,
          sh.oppdatert_tid,
          ty.oppdatert_tid) AS endret_tid,
        concat(b.id, '-', tp.id, '-', ty.id, '-', br.id, '-', s.id) AS unik_id
      FROM
        `datastream_hendelser.public_tilkjent_ytelse_periode` tp
      JOIN
        `datastream_hendelser.public_tilkjent_ytelse` ty
        ON
          tp.tilkjent_ytelse_id = ty.id
      JOIN
        `datastream_hendelser.public_behandling` b
        ON
          ty.behandling_id = b.id
      JOIN
        `ytelsestatistikk.view_gyldige_behandlinger` gyldig
        ON
          gyldig.behandling_id = b.id
      JOIN
        `datastream_hendelser.public_behandling_referanse` br
        ON
          b.referanse_id = br.id
      JOIN
        `datastream_hendelser.public_sak` s
        ON
          b.sak_id = s.id
      JOIN
        `datastream_hendelser.public_sak_historikk` sh
        ON
          sh.sak_id = s.id
          AND sh.gjeldende = TRUE
      JOIN
        `datastream_hendelser.public_behandling_historikk` bh
        ON
          bh.id = gyldig.bh_id
