apiVersion: nais.io/v1
kind: Naisjob
metadata:
  labels:
    team: aap
  name: aap-statistikk-soda-contracts
  namespace: aap
spec:
  image: europe-north1-docker.pkg.dev/nais-management-233d/nada/nada-soda-contracts:2026.06.26-07.45-17daf0b
  accessPolicy:
    outbound:
      rules:
        - application: nada-soda
          namespace: nada
  schedule: "15 7 * * *"
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 1
  successfulJobsHistoryLimit: 1
  backoffLimit: 1
  env:
    - name: SODA_CONFIG
      value: /var/run/configmaps/aap-statistikk-soda-config/config.yaml
    - name: SODA_CHECKS_FOLDER
      value: /var/run/configmaps/aap-statistikk-soda-checks
    - name: SLACK_CHANNEL
      value: "#aap-statistikk"
    - name: NOTIFY_OK_SCAN_STATUS
      value: "false"
  filesFrom:
    - configmap: aap-statistikk-soda-config
    - configmap: aap-statistikk-soda-checks
  gcp:
    permissions:
      - resource:
          apiVersion: resourcemanager.cnrm.cloud.google.com/v1beta1
          kind: Project
          name: "{{project}}"
        role: roles/bigquery.dataViewer
      - resource:
          apiVersion: resourcemanager.cnrm.cloud.google.com/v1beta1
          kind: Project
          name: "{{project}}"
        role: roles/bigquery.jobUser
