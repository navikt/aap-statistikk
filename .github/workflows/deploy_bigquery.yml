name: Deploy BigQuery Resources

on:
  workflow_call:
    inputs:
      cluster:
        required: true
        type: string
      project:
        required: true
        type: string

jobs:
  deploy-views:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: nais/deploy/actions/deploy@2d18f050f07b6a007864c6a57070ed915d571beb # v2
        env:
          CLUSTER: ${{ inputs.cluster }}
          RESOURCE: "\
            .nais/bigquery/view_gyldige_behandlinger.yml,\
            .nais/bigquery/view_vilkarsresultat.yml,\
            .nais/bigquery/view_tilkjent_ytelse.yml,\
            .nais/bigquery/view_beregningsgrunnlag.yml,\
            .nais/bigquery/view_saksstatistikk.yml,\
            .nais/bigquery/view_utbetaling.yml,\
            .nais/bigquery/view_meldekort.yml,\
            .nais/bigquery/view_samordning.yml,\
            .nais/bigquery/view_gjeldende_hendelser_saksstatistikk.yml,\
            .nais/bigquery/view_behandlinger_test.yml,\
            .nais/bigquery/view_behandlinger.yml"
          VAR: project=${{ inputs.project }}
          PRINT_PAYLOAD: true
