name: "CodeQL"

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["kotlin"]
    env:
      GITHUB_PASSWORD: ${{ secrets.READER_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          build-mode: manual
          languages: ${{ matrix.language }}

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21.x'

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          gradle-version: wrapper

      - name: Build
        run: ./gradlew assemble --no-build-cache --no-configuration-cache -x detekt
        # temporary while waiting for kotlin 2.3 support in CodeQL FIXME
        continue-on-error: true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{matrix.language}}"

      - run: ./gradlew detektMain
        # temporary while waiting for kotlin 2.3 support in CodeQL FIXME
        continue-on-error: true

      - name: Upload Detekt SARIF
        # temporary while waiting for kotlin 2.3 support in CodeQL FIXME
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: app/build/reports/detekt/main.sarif
