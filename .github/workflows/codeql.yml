name: "CodeQL"

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["kotlin"]
    env:
      GITHUB_PASSWORD: ${{ secrets.READER_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          build-mode: manual
          languages: ${{ matrix.language }}

      - name: Setup Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: 'temurin'
          java-version: '21.x'

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          gradle-version: wrapper

      - name: Build
        run: ./gradlew assemble --no-build-cache --no-configuration-cache -x detekt
        # temporary while waiting for kotlin 2.3 support in CodeQL FIXME
        continue-on-error: true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{matrix.language}}"

      - run: ./gradlew detektMain
        # temporary while waiting for kotlin 2.3 support in CodeQL FIXME
        continue-on-error: true

      - name: Upload Detekt SARIF
        # temporary while waiting for kotlin 2.3 support in CodeQL FIXME
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: app/build/reports/detekt/main.sarif
