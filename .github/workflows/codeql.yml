name: "CodeQL"

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["kotlin"]
    env:
      GITHUB_PASSWORD: ${{ secrets.READER_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          build-mode: manual
          languages: ${{ matrix.language }}

      - name: Setup Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: 'temurin'
          java-version: '21.x'

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          gradle-version: wrapper

      - name: Build
        run: ./gradlew assemble --no-build-cache --no-configuration-cache -x detekt
        # temporary while waiting for kotlin 2.3 support in CodeQL FIXME
        continue-on-error: true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          category: "/language:${{matrix.language}}"

      - run: ./gradlew detektMain
        # temporary while waiting for kotlin 2.3 support in CodeQL FIXME
        continue-on-error: true

      - name: Upload Detekt SARIF
        # temporary while waiting for kotlin 2.3 support in CodeQL FIXME
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          sarif_file: app/build/reports/detekt/main.sarif
